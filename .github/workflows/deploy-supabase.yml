name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Show Supabase CLI version
        run: npx supabase@latest --version

      - name: Link project
        run: npx supabase@latest link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: npx supabase@latest db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy ai-proxy
        run: npx supabase@latest functions deploy ai-proxy --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy save-user-ai-key
        run: npx supabase@latest functions deploy save-user-ai-key --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy url-import-proxy
        run: npx supabase@latest functions deploy url-import-proxy --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"
