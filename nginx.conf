# Nginx configuration for kcalculator.eu
# Copy this to /etc/nginx/sites-available/kcalculator.eu
# Then: sudo ln -s /etc/nginx/sites-available/kcalculator.eu /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx

# Security headers configuration
map $sent_http_content_type $csp_header {
    default "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://world.openfoodfacts.org https://api.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'; upgrade-insecure-requests";
}

# HTTPS Server Block (Main)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kcalculator.eu www.kcalculator.eu;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/kcalculator.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kcalculator.eu/privkey.pem;

    # Modern TLS (A+ SSL Labs rating)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling (faster SSL handshake)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/kcalculator.eu/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://world.openfoodfacts.org https://api.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'; upgrade-insecure-requests" always;

    # Site root
    root /var/www/kcalculator.eu/dist;
    index index.html index.htm;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_disable "msie6";

    # Logging
    access_log /var/log/nginx/kcalculator.eu-access.log;
    error_log /var/log/nginx/kcalculator.eu-error.log;

    # SPA routing: fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        proxy_ssl_session_reuse off;
    }

    # Cache versioned assets (Vite adds hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache policy for index.html (short cache, no browser caching)
    location = /index.html {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to .env, .git, etc.
    location ~ \.(env|git|gitignore|htaccess|htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Rate limiting (optional, requires limit_req_zone)
    # Uncomment to enable:
    # limit_req zone=api burst=100 nodelay;
    # limit_req_status 429;
}

# HTTP Server Block - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kcalculator.eu www.kcalculator.eu;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

